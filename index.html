<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mist Earth: Survival</title>
    <style>
        /* [1. 기본 레이아웃 & 오프닝 스타일] */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; font-family: 'Courier New', Courier, monospace; overflow: hidden; color: #33ff33; }
        #opening-container { display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; transition: opacity 1s ease-in-out; position: absolute; top: 0; left: 0; width: 100%; z-index: 200; background: #000; }
        #screen { width: 85%; max-width: 850px; height: 600px; border: 2px solid #1a4a1a; padding: 40px; position: relative; background: radial-gradient(circle, #0a1a0a 0%, #000 100%); box-shadow: 0 0 30px rgba(0, 255, 0, 0.1); }
        #terminal { font-size: 1.1rem; line-height: 1.6; white-space: pre-wrap; height: 100%; overflow: hidden; }
        #skip-btn { position: absolute; bottom: 20px; right: 20px; padding: 8px 15px; background: rgba(0, 255, 0, 0.1); border: 1px solid #1a4a1a; color: #1a4a1a; cursor: pointer; font-family: inherit; font-size: 0.8rem; transition: 0.3s; z-index: 100; display: none; }
        #skip-btn:hover { background: #33ff33; color: #000; border-color: #33ff33; }
        .fatal { color: #ff3333 !important; text-shadow: 0 0 8px red; }
        .success { color: #33ff33 !important; text-shadow: 0 0 12px #33ff33; font-weight: bold; }
        .warning { color: #2a8a2a; }
        #glitch-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.03); pointer-events: none; opacity: 0; z-index: 10; }
        #boot-btn { padding: 20px 40px; background: none; border: 1px solid #33ff33; color: #33ff33; cursor: pointer; font-size: 1.2rem; font-family: inherit; transition: 0.3s; }
        #boot-btn:hover { background: #33ff33; color: #000; box-shadow: 0 0 20px #33ff33; }

        /* [2. 메인 게임 콘텐츠 (타이틀 + 시나리오)] */
        #game-content { 
            display: none; width: 100%; height: 100vh; position: relative; opacity: 0;
            /* ✅ 수정: background-image 트랜지션 추가 */
            transition: opacity 2s ease-in-out, background-color 1s ease-in-out;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                              url('background_title_4k.jpg'), url('background_title.png');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            image-rendering: high-quality;
        }

        /* ✅ 수정: Start 클릭 후 배경을 검정으로 바꾸는 클래스 */
        #game-content.bg-black {
            background-image: none;
            background-color: #000;
        }
        
        /* 안개 효과 */
        .fog-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 1; pointer-events: none; }
        .fog { position: absolute; top: 0; left: 0; width: 200%; height: 100%; background: url('https://www.transparenttextures.com/patterns/fog.png'); opacity: 0.3; animation: fog-move 60s linear infinite; transition: opacity 1s ease-in-out; }
        @keyframes fog-move { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* ✅ 수정: 배경 검정 전환 시 안개도 서서히 사라지는 클래스 */
        #game-content.bg-black .fog { opacity: 0; }

        /* ✅ 추가: 장면 전환용 페이드 오버레이 */
        #fade-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; opacity: 0; pointer-events: none; transition: opacity 0.8s ease-in-out; z-index: 50; }

        /* 장면(Scene) 관리 */
        .scene { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; z-index: 5; position: absolute; top: 0; left: 0; }
        .scene.active { display: flex !important; }

        /* 타이틀 로고 */
        #game-logo { width: 85%; max-width: 650px; height: auto; margin-bottom: 50px; filter: drop-shadow(0 0 15px rgba(0, 255, 0, 0.3)); z-index: 2; animation: logo-blink 8s infinite; }
        @keyframes logo-blink { 0%, 95%, 100% { opacity: 1; } 96% { opacity: 0.8; } 98% { opacity: 0.9; } }
        .menu-container { display: flex; flex-direction: column; gap: 20px; z-index: 2; }
        .menu-btn { background: rgba(0, 0, 0, 0.7); border: 1px solid #33ff33; color: #33ff33; padding: 15px 60px; font-size: 1.5rem; cursor: pointer; font-family: inherit; transition: 0.3s; width: 300px; text-transform: uppercase; text-align: center; }
        .menu-btn:hover { background: #33ff33; color: #000; box-shadow: 0 0 20px #33ff33; transform: scale(1.05); }

        /* 시나리오 터미널 박스 */
        #scenario-terminal-box { width: 85%; max-width: 850px; height: 600px; border: 2px solid #1a4a1a; padding: 40px; position: relative; background: radial-gradient(circle, #0a1a0a 0%, #000 100%); cursor: pointer; box-shadow: 0 0 30px rgba(0, 255, 0, 0.1); }
        #scenario-text { font-size: 1.1rem; line-height: 1.6; white-space: pre-wrap; height: 100%; overflow-y: auto; text-align: left; }
        #scenario-text::-webkit-scrollbar { display: none; }

        /* 입력 및 선택지 위치 상단 조정 */
        .ui-overlay { display: none; position: relative; margin-top: -100px; z-index: 10; gap: 15px; justify-content: flex-start; width: 100%; padding-left: 40px; }
        #user-name-input { background: none; border: none; border-bottom: 2px solid #33ff33; color: #33ff33; font-family: inherit; font-size: 1.1rem; width: 250px; outline: none; padding: 5px 0; }
        .choice-btn { background: rgba(0, 255, 0, 0.05); border: 1px solid #33ff33; color: #33ff33; padding: 10px 25px; cursor: pointer; font-family: inherit; transition: 0.3s; font-size: 1rem; }
        .choice-btn:hover { background: #33ff33; color: #000; box-shadow: 0 0 10px rgba(51, 255, 51, 0.5); }

        /* [3. 뮤직 플레이어 & 시스템 버튼] */
        .system-controls { position: absolute; bottom: 30px; right: 30px; display: flex; gap: 15px; z-index: 100; }
        .sys-btn { width: 60px; height: 60px; background: rgba(20, 20, 20, 0.9); border: 1px solid #444; border-radius: 50%; color: #777; font-size: 1.5rem; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        .sys-btn:hover { border-color: #33ff33; color: #33ff33; box-shadow: 0 0 10px rgba(51, 255, 51, 0.3); }
        
        #music-player-popup { display: none; position: absolute; bottom: 100px; right: 30px; width: 450px; background: rgba(10, 10, 10, 0.98); border: 1px solid #333; padding: 25px; z-index: 110; box-shadow: 0 0 30px rgba(0, 0, 0, 0.8); text-align: left; }
        #music-player-popup h3 { margin-top: 0; color: #777; font-size: 1.3rem; border-bottom: 1px solid #222; padding-bottom: 10px; font-family: serif; letter-spacing: 2px; text-transform: uppercase; }
        .track-list { list-style: none; padding: 0; margin: 0 0 15px 0; max-height: 200px; overflow-y: auto; background: #050505; border: 1px solid #111; }
        .track-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #111; transition: 0.2s; color: #444; font-family: serif; }
        .track-item:hover { background: #111; color: #33ff33; }
        .track-item.active { color: #33ff33; font-weight: bold; background: #151515; border-left: 4px solid #33ff33; }
        
        .player-controls { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        #play-pause-btn { background: none; border: 1px solid #444; color: #666; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; transition: 0.2s; }
        #play-pause-btn:hover { border-color: #33ff33; color: #33ff33; }
        .progress-bar-bg { flex-grow: 1; height: 4px; background: #222; cursor: pointer; position: relative; }
        #progress-bar-fill { height: 100%; background: #33ff33; width: 0%; transition: width 0.1s linear; }
        #volume-slider { width: 100px; accent-color: #33ff33; cursor: pointer; margin-left: auto; display: block; }

        /* ✅ 추가: 재생 모드 버튼 */
        #repeat-btn { background: none; border: 1px solid #444; color: #444; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; transition: 0.2s; flex-shrink: 0; }
        #repeat-btn:hover { border-color: #33ff33; color: #33ff33; }

        /* ✅ 추가: 줌 전환 오버레이 */
        #zoom-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; opacity: 0; pointer-events: none; z-index: 60; transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out; transform: scale(1); }
        @keyframes zoom-out {
            0%   { opacity: 0; transform: scale(1); }
            100% { opacity: 1; transform: scale(0.85); }
        }
        #zoom-overlay.zooming { animation: zoom-out 0.7s ease-in-out forwards; pointer-events: all; }

        /* ✅ 추가: 프롤로그 씬 레이아웃 */
        #scene-prologue { background: #000; }
        .prologue-slide { display: flex; width: 100%; height: 100%; align-items: center; justify-content: center; gap: 0; opacity: 0; transition: opacity 0.8s ease-in-out; }
        .prologue-slide.visible { opacity: 1; }
        .prologue-img-wrap { width: 50%; height: 100%; position: relative; overflow: hidden; flex-shrink: 0; }
        .prologue-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .prologue-img-wrap .img-fallback { width: 100%; height: 100%; background: #0a1a0a; border-right: 1px solid #1a4a1a; display: flex; align-items: center; justify-content: center; color: #1a4a1a; font-size: 0.9rem; }
        .prologue-text-wrap { width: 50%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 60px 50px 100px 50px; box-sizing: border-box; overflow-y: auto; }
        .prologue-page-num { color: #1a4a1a; font-size: 0.85rem; margin-bottom: 20px; letter-spacing: 3px; }
        .prologue-body { color: #33ff33; font-size: 1.0rem; line-height: 2.0; white-space: normal; flex-grow: 1; overflow-y: auto; }
        .prologue-body strong { color: #fff; font-weight: bold; text-shadow: 0 0 6px rgba(255,255,255,0.4); }
        .prologue-body .section-title { display: block; color: #66ff66; font-size: 1.05rem; font-weight: bold; margin-top: 1.6em; margin-bottom: 0.4em; letter-spacing: 1px; border-left: 3px solid #33ff33; padding-left: 10px; }
        .prologue-body .section-title:first-child { margin-top: 0; }
        .prologue-body .para { display: block; margin-bottom: 0.6em; text-indent: 1em; }
        /* ✅ 스크롤바 디자인 */
        .prologue-body::-webkit-scrollbar { width: 6px; }
        .prologue-body::-webkit-scrollbar-track { background: transparent; }
        .prologue-body::-webkit-scrollbar-thumb { background: #33ff33; border-radius: 0; }
        .prologue-body::-webkit-scrollbar-thumb:hover { background: #66ff66; }
        .prologue-next-btn { align-self: flex-end; margin-top: 20px; margin-bottom: 20px; background: none; border: 1px solid #33ff33; color: #33ff33; padding: 10px 30px; cursor: pointer; font-family: inherit; font-size: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.5s, background 0.3s; }
        .prologue-next-btn.show { opacity: 1; pointer-events: all; }
        .prologue-next-btn:hover { background: #33ff33; color: #000; }
        #repeat-btn.active { border-color: #33ff33; color: #33ff33; }
        /* ✅ 수정: 전체 커서 화살표로 고정 */
        body, button, input, * { cursor: default !important; }
        .choice-btn, .menu-btn, .prologue-next-btn, .sys-btn, #boot-btn, #skip-btn, #play-pause-btn, #repeat-btn, .track-item, .progress-bar-bg, #volume-slider { cursor: pointer !important; }
        #user-name-input { cursor: text !important; }

        .cursor { display: inline-block; width: 10px; height: 1.2rem; background: #33ff33; animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body onclick="handleGlobalClick()">

    <div id="opening-container">
        <button id="boot-btn">SYSTEM BOOT</button>
        <div id="screen" style="display: none;">
            <div id="glitch-overlay"></div>
            <div id="terminal"></div>
            <span id="opening-cursor" class="cursor">_</span>
            <button id="skip-btn">SKIP_SEQUENCE >></button>
        </div>
    </div>

    <!-- 줌 전환 오버레이 -->
    <div id="zoom-overlay"></div>

    <!-- ✅ 추가: 장면 전환용 페이드 오버레이 -->
    <div id="fade-overlay"></div>

    <div id="game-content">
        <div class="fog-container"><div class="fog"></div></div>

        <section id="scene-title" class="scene active">
            <img src="mist_logo_transparent.png" alt="MIST WALKER" id="game-logo">
            <div class="menu-container">
                <button class="menu-btn" onclick="changeScene('START')">Start</button>
                <button class="menu-btn" id="continue-btn">Continue</button>
                <button class="menu-btn">Setting</button>
            </div>
        </section>

        <section id="scene-prologue" class="scene">
            <div class="prologue-slide" id="prologue-slide">
                <div class="prologue-img-wrap" id="prologue-img-wrap">
                    <!-- 이미지는 JS에서 동적으로 로드 -->
                    <div class="img-fallback" id="prologue-img-fallback">[ IMAGE ]</div>
                </div>
                <div class="prologue-text-wrap">
                    <div class="prologue-page-num" id="prologue-page-num">— 01 / 07 —</div>
                    <div class="prologue-body" id="prologue-body"></div>
                    <button class="prologue-next-btn" id="prologue-next-btn" onclick="prologueNext(event)">NEXT ▶</button>
                </div>
            </div>
        </section>

        <section id="scene-terminal" class="scene">
            <div id="scenario-terminal-box">
                <div id="scenario-text"></div>
                <span id="scenario-cursor" class="cursor">_</span>
                
                <div id="name-input-ui" class="ui-overlay">
                    <input type="text" id="user-name-input" maxlength="15" autocomplete="off" placeholder="NAME_HERE">
                    <button class="choice-btn" onclick="submitName(event)">[확인]</button>
                </div>

                <!-- 이름 확인 팝업 -->
                <div id="name-confirm-ui" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#000; border:2px solid #33ff33; padding:30px 40px; z-index:20; text-align:center; box-shadow:0 0 30px rgba(51,255,51,0.3);">
                    <p id="name-confirm-text" style="color:#33ff33; font-size:1.1rem; margin:0 0 25px 0; white-space:nowrap;"></p>
                    <div style="display:flex; gap:20px; justify-content:center;">
                        <button class="choice-btn" onclick="confirmName(event)">[예]</button>
                        <button class="choice-btn" onclick="cancelName(event)">[아니오]</button>
                    </div>
                </div>

                <div id="gender-choices-ui" class="ui-overlay">
                    <button class="choice-btn" onclick="setGender('남성', event)">[남성]</button>
                    <button class="choice-btn" onclick="setGender('여성', event)">[여성]</button>
                    <button class="choice-btn" onclick="setGender('무성', event)">[무성]</button>
                </div>

                <div id="protocol-choices-ui" class="ui-overlay">
                    <button class="choice-btn" onclick="onProtocolYes(event)">[YES]</button>
                    <button class="choice-btn" onclick="alert('Main 이동 로직 연결 대기')">[NO]</button>
                </div>

                <!-- ✅ 추가: 프롤로그 확인 팝업 -->
                <div id="prologue-confirm-ui" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#000; border:2px solid #33ff33; padding:30px 40px; z-index:20; text-align:center; box-shadow:0 0 30px rgba(51,255,51,0.3);">
                    <p style="color:#33ff33; font-size:1.1rem; margin:0 0 25px 0; white-space:nowrap;">프롤로그를 시작하시겠습니까?</p>
                    <div style="display:flex; gap:20px; justify-content:center;">
                        <button class="choice-btn" onclick="startPrologue(event)">[예]</button>
                        <button class="choice-btn" onclick="closePrologueConfirm(event)">[아니오]</button>
                    </div>
                </div>
            </div>
        </section>

        <div class="system-controls">
            <button class="sys-btn" onclick="saveGame(event)" style="font-size:0.75rem">SAVE</button>
            <button class="sys-btn" id="music-toggle-btn">♪</button>
        </div>

        <div id="music-player-popup">
            <h3>ANCIENT_RECORDS</h3>
            <ul class="track-list" id="track-list"></ul>
            <div class="player-controls">
                <button id="play-pause-btn">▶</button>
                <div class="progress-bar-bg" id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
                <button id="repeat-btn" title="재생 모드">↩1</button>
            </div>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <audio id="snd-beep" src="beep.wav"></audio>
    <audio id="snd-charge" src="charge.mp3"></audio>
    <audio id="snd-shock" src="shock.mp3"></audio>
    <audio id="main-bgm"></audio>

    <script>
        // --- [1] 전역 변수 및 데이터 ---
        const GameState = { name: "", gender: "" };
        const openingTerminal = document.getElementById('terminal');
        const openingCursor = document.getElementById('opening-cursor');
        const openingContainer = document.getElementById('opening-container');
        const gameContent = document.getElementById('game-content');
        const bootBtn = document.getElementById('boot-btn');
        const skipBtn = document.getElementById('skip-btn');
        const glitchOverlay = document.getElementById('glitch-overlay');
        const mainBgm = document.getElementById('main-bgm');

        let isOpeningSkipped = false;
        let isTyping = false;
        let skipTyping = false;
        let playlist = [];
        let currentTrackIndex = 0;

        const openingScriptData = [
            { type: "normal", text: "[Mist warker Manager Program]" },
            { type: "normal", text: "--------------------------------" },
            { type: "normal", text: "Mist concentration ... OK" },
            { type: "normal", text: "Mist infection ... OK" },
            { type: "normal", text: "Mental Preservation ... OK" },
            { type: "normal", text: "--------------------------------" },
            { type: "normal", text: "Check Health Condition ..." },
            { type: "normal", text: "..." },
            { type: "fatal_line", text: "Fatal" },
            { type: "blank", text: "" },
            { type: "normal", text: "Emergency Revival Protocol - Active" },
            { type: "countdown", text: "Fail" },
            { type: "countdown", text: "Fail" },
            { type: "countdown_success", text: "Success !" },
            { type: "normal", text: "--------------------------------" },
            { type: "blank", text: "" },
            { type: "success_line", text: "돌아오신 것을 환영합니다.\n미스트 워커님" }
        ];

        const wait = (ms) => new Promise(r => setTimeout(r, ms));

        // --- [2] 오프닝 로직 ---
        bootBtn.addEventListener('click', () => {
            bootBtn.style.display = 'none';
            document.getElementById('screen').style.display = 'block';
            skipBtn.style.display = 'block';
            document.getElementById('snd-beep').play().catch(()=>{});
            runOpeningSequence();
        });

        skipBtn.addEventListener('click', () => { isOpeningSkipped = true; showTitleScreen(); });

        async function typeOpeningText(text, target, speed = 30) {
            for (let char of text) {
                if (isOpeningSkipped) break;
                target.textContent += char;
                await wait(speed);
            }
        }

        async function runOpeningSequence() {
            const glitchInterval = setInterval(() => {
                if(isOpeningSkipped) clearInterval(glitchInterval);
                glitchOverlay.style.opacity = Math.random() > 0.94 ? 0.2 : 0;
            }, 70);

            for (let line of openingScriptData) {
                if (isOpeningSkipped) break;
                const div = document.createElement('div');
                openingTerminal.appendChild(div);

                if (line.type === "countdown" || line.type === "countdown_success") {
                    div.className = 'warning';
                    for (let n of ["3 ", "2 ", "1 "]) {
                        if (isOpeningSkipped) break;
                        div.innerHTML += n;
                        await wait(1000);
                    }
                    if (isOpeningSkipped) break;
                    div.innerHTML += "... ";
                    document.getElementById('snd-charge').currentTime = 0;
                    document.getElementById('snd-charge').play().catch(()=>{});
                    await wait(1500);

                    if (isOpeningSkipped) break;
                    document.getElementById('snd-shock').currentTime = 0;
                    document.getElementById('snd-shock').play().catch(()=>{});
                    
                    const isSuccess = line.type === "countdown_success";
                    div.className = isSuccess ? 'success' : 'fatal';
                    const span = document.createElement('span');
                    span.textContent = line.text;
                    span.className = div.className;
                    div.appendChild(span);
                    
                    glitchOverlay.style.opacity = 0.5;
                    await wait(100);
                    glitchOverlay.style.opacity = 0;
                    await wait(1200);
                } else if (line.type === "fatal_line") {
                    div.className = 'fatal';
                    div.textContent = line.text;
                    await wait(1500);
                } else if (line.type === "success_line") {
                    openingCursor.style.display = 'none';
                    div.className = 'success';
                    await typeOpeningText(line.text, div, 50);
                    openingCursor.style.display = 'inline-block';
                    await wait(2000);
                } else if (line.type === "blank") {
                    div.innerHTML = "&nbsp;";
                    await wait(500);
                } else {
                    await typeOpeningText(line.text, div, 30);
                    await wait(line.text.includes("...") ? 1000 : 400);
                }
            }
            if (!isOpeningSkipped) { clearInterval(glitchInterval); showTitleScreen(); }
        }

        function showTitleScreen() {
            openingContainer.style.opacity = '0';
            setTimeout(() => {
                openingContainer.style.display = 'none';
                gameContent.style.display = 'block';
                setTimeout(() => { gameContent.style.opacity = '1'; initMusicPlayer(); }, 100);
            }, isOpeningSkipped ? 0 : 1000);
        }

        // --- [3] 시나리오 및 장면 전환 (SPA) ---
        const fadeOverlay = document.getElementById('fade-overlay');

        function changeScene(sceneId, skipFade = false) {
            if (skipFade) {
                // 페이드 없이 바로 전환 (줌 효과 등 별도 전환 시 사용)
                document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.ui-overlay').forEach(ui => ui.style.display = 'none');
                document.getElementById('prologue-confirm-ui').style.display = 'none';

                if (sceneId === 'START' || sceneId === 'BODY' || sceneId === 'PROLOGUE') {
                    gameContent.classList.add('bg-black');
                }
                if (sceneId === 'START') {
                    document.getElementById('scene-terminal').classList.add('active');
                    runStartScenario();
                } else if (sceneId === 'BODY') {
                    document.getElementById('scene-terminal').classList.add('active');
                    runBodyScenario();
                } else if (sceneId === 'PROLOGUE') {
                    document.getElementById('scene-prologue').classList.add('active');
                    setTimeout(() => runPrologueScenario(), 150);
                }
                return;
            }

            // 기본: 페이드 아웃 → 장면 교체 → 페이드 인
            fadeOverlay.style.opacity = '1';
            fadeOverlay.style.pointerEvents = 'all';

            setTimeout(() => {
                document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.ui-overlay').forEach(ui => ui.style.display = 'none');
                document.getElementById('prologue-confirm-ui').style.display = 'none';

                if (sceneId === 'START' || sceneId === 'BODY' || sceneId === 'PROLOGUE') {
                    gameContent.classList.add('bg-black');
                }

                if (sceneId === 'START') {
                    document.getElementById('scene-terminal').classList.add('active');
                    runStartScenario();
                } else if (sceneId === 'BODY') {
                    document.getElementById('scene-terminal').classList.add('active');
                    runBodyScenario();
                } else if (sceneId === 'PROLOGUE') {
                    document.getElementById('scene-prologue').classList.add('active');
                    setTimeout(() => runPrologueScenario(), 150);
                }

                setTimeout(() => {
                    fadeOverlay.style.opacity = '0';
                    fadeOverlay.style.pointerEvents = 'none';
                }, 100);

            }, 800);
        }

        const scenarioText = document.getElementById('scenario-text');
        async function typeScenarioLine(text, speed = 25) {
            isTyping = true; skipTyping = false;
            for (let i = 0; i < text.length; i++) {
                if (skipTyping) { scenarioText.textContent += text.substring(i); break; }
                scenarioText.textContent += text[i];
                scenarioText.scrollTop = scenarioText.scrollHeight;
                await new Promise(r => setTimeout(r, speed));
            }
            isTyping = false;
        }

        function handleGlobalClick() {
            if (gameContent.style.display === 'block' && isTyping) skipTyping = true;
        }

        async function runStartScenario() {
            scenarioText.textContent = "";
            await typeScenarioLine("Mist Warker Management Program - online\n", 40);
            scenarioText.textContent += "----------------------------------------\n";
            await wait(500);
            await typeScenarioLine("반갑습니다.\n미스트 워커님\n", 50);
            scenarioText.textContent += "----------------------------------------\n";
            await wait(600);
            await typeScenarioLine("현재 기초 정보가 손실되었습니다. 개체 등록을 다시 시작합니다.\n\n이름을 입력해 주십시요.\n", 30);
            document.getElementById('name-input-ui').style.display = 'flex';
            document.getElementById('user-name-input').focus();
        }

        function submitName(e) {
            e.stopPropagation();
            const name = document.getElementById('user-name-input').value.trim();
            if (name) {
                // 확인 팝업 표시
                document.getElementById('name-confirm-text').textContent = `[ ${name} ] 이 확실합니까?`;
                document.getElementById('name-input-ui').style.display = 'none';
                document.getElementById('name-confirm-ui').style.display = 'block';
            }
        }

        function confirmName(e) {
            e.stopPropagation();
            const name = document.getElementById('user-name-input').value.trim();
            GameState.name = name;
            document.getElementById('name-confirm-ui').style.display = 'none';
            scenarioText.textContent += `\n> 등록 완료: ${name}\n----------------------------------------\n`;
            setTimeout(() => {
                scenarioText.textContent = "";
                changeScene('BODY');
            }, 1000);
        }

        function cancelName(e) {
            e.stopPropagation();
            document.getElementById('name-confirm-ui').style.display = 'none';
            document.getElementById('name-input-ui').style.display = 'flex';
            document.getElementById('user-name-input').focus();
        }

        async function runBodyScenario() {
            scenarioText.textContent = "";
            await typeScenarioLine("Mist Warker Management Program - online\n", 40);
            scenarioText.textContent += "----------------------------------------\n";
            await wait(500);
            await typeScenarioLine(`확인된 개체명: ${GameState.name}\n`, 20);
            await typeScenarioLine("미스트 워커님의 신체 성별을 선택해 주십시요.\n", 30);
            document.getElementById('gender-choices-ui').style.display = 'flex';
        }

        function setGender(gender, e) {
            e.stopPropagation();
            GameState.gender = gender;
            document.getElementById('gender-choices-ui').style.display = 'none';
            scenarioText.textContent += `\n[성별] ${gender} 확인 완료\n----------------------------------------\n`;
            setTimeout(async () => {
                await typeScenarioLine("기억복구 프로토콜을 시작하시겠습니까?\n", 30);
                await typeScenarioLine("[과거의 기억 및 역사정보, 기초 정보를 제공합니다.]\n", 30);
                document.getElementById('protocol-choices-ui').style.display = 'flex';
            }, 600);
        }

        function onProtocolYes(e) {
            e.stopPropagation();
            document.getElementById('protocol-choices-ui').style.display = 'none';
            document.getElementById('prologue-confirm-ui').style.display = 'block';
        }

        function closePrologueConfirm(e) {
            e.stopPropagation();
            document.getElementById('prologue-confirm-ui').style.display = 'none';
            document.getElementById('protocol-choices-ui').style.display = 'flex';
        }

        function startPrologue(e) {
            e.stopPropagation();
            document.getElementById('prologue-confirm-ui').style.display = 'none';

            const zoomEl = document.getElementById('zoom-overlay');

            // 1단계: 줌 아웃 (화면이 검정으로 덮임)
            zoomEl.classList.add('zooming');
            zoomEl.addEventListener('animationend', () => {
                zoomEl.classList.remove('zooming');
                zoomEl.style.opacity = '1'; // 검정 유지
                zoomEl.style.transform = 'scale(1)';
                zoomEl.style.pointerEvents = 'all';

                // 2단계: 씬 전환
                changeScene('PROLOGUE', true);

                // 3단계: 검정 걷어내며 줌 인 효과
                setTimeout(() => {
                    zoomEl.style.opacity = '0';
                    zoomEl.style.transform = 'scale(1.08)';
                    setTimeout(() => {
                        zoomEl.style.transform = 'scale(1)';
                        zoomEl.style.pointerEvents = 'none';
                    }, 600);
                }, 100);

            }, { once: true });
        }

        // --- [5] 프롤로그 씬 ---
        const prologueData = [
            { img: 'Prologue/prologue_1', text: `1. 차원의 균열과 미스트의 태동 (1938~1939)\n인류가 마주한 가장 거대한 수수께끼는 1938년, 나치 독일의 라이프치히 동쪽 숲에서 시작되었습니다.\n우연히 발견된 **'차원의 균열'**은 기존의 물리학을 뒤흔들었으며, 이듬해 과학자 **프리드리히 K. 할베르크**가 균열에서 흘러나오는 안개, 즉 **'미스트'**를 에너지원으로 변환하는 데 성공하며 인류는 미증유의 동력을 손에 넣게 되었습니다.\n\n2. 병기화와 제국의 폭주 (1940~1945)\n미스트의 잠재력은 곧 파멸의 도구가 되었습니다.\n**베르너 H. 크라우스**와 **헬무트 라이거**에 의해 군사적 병기화가 완성되자, 나치 독일은 압도적인 기술 우위를 앞세워 유럽 전역을 유린하기 시작했습니다.\n1944년 **클라우디아 포겔만**이 미스트의 산업적 이용 가치까지 입증하며 독일의 국력은 정점에 달했고, 1945년에는 영국을 제외한 유럽 대륙과 소련 일부까지 점령하는 광폭한 행보를 보였습니다.\n\n3. 기술의 확산과 2차 대전의 장기화 (1946~1953)\n그러나 미스트는 독일만의 전유물이 아니었습니다.\n세계 곳곳에서 차원 균열이 추가로 발견되며 다른 강대국들 역시 미스트 기술을 습득했고, 이로 인해 종결되어야 할 전쟁은 끝을 알 수 없는 소모전으로 치달았습니다.\n특히 아시아에서는 일본 제국이 미스트 기술을 이용해 한반도와 중국 대륙 절반을 점령하며 극심한 탄압을 이어갔습니다.\n\n4. 일본 본토의 절멸과 새로운 국가의 탄생 (1953~1954)\n교착 상태를 끊은 것은 미국의 극단적인 선택이었습니다.\n미국의 미스트 폭탄 **'블라인드 맨(Blind Man)'**과 **'포그 보이(Fog Boy)'**가 히로시마와 도쿄를 타격했고, 이 가공할 무력 앞에 일본 본토 인구의 절반 이상이 절멸하는 비극이 발생했습니다.\n이 혼란을 틈타 조선의 독립군은 무력 항쟁을 통해 독립을 쟁취했습니다.\n이후 독립군은 미국의 지원 하에 빠르게 일본 본토로 상륙하여 나가사키에서 도쿄에 이르는 일본 본토 절반을 영토화했습니다.\n본토에 남겨진 생존자들은 자연스럽게 조선의 문화와 인종에 융합되었으며, 이는 훗날 대륙과 열도를 아우르는 거대한 문화적 변혁의 시작점이 되었습니다.` },
            { img: 'Prologue/prologue_2', text: `1. 새로운 국가의 탄생과 독자적 기술의 태동 (1954)\n일본 본토 상륙과 문화적 융합을 성공적으로 지휘한 **'정민찬'**은 조선의 국호를 **'대한제국'**으로 선포하고 초대 총통의 자리에 올랐습니다.\n당시 한반도는 소련이 나치 독일과의 전쟁에 집중하느라 개입할 여력이 없었던 덕분에 남북 분단의 비극을 피할 수 있었습니다.\n정민찬은 일본 본토에 투하되었던 '블라인드 맨'과 '포그 보이'의 잔류 활성 미스트를 수거하여, 서구권과는 전혀 다른 방식의 독자적인 미스트 기술을 비밀리에 연구하기 시작했습니다.\n\n2. 동경 지하의 유산과 권력의 승계 (1963)\n대한제국은 미국의 비호 아래 제한된 수준의 미스트 기술로 산업화를 진행 중이었습니다.\n그러나 도쿄 지하에서 과거 일제가 전 세계에서 수집했던 미스트 기술 기밀들이 발견되며 정세는 급변합니다.\n정민찬은 미국의 감시망을 피해 이 기술들을 본격적으로 개발하고자 총통직에서 물러나 지하 연구를 지휘하기 시작했고, 그의 아들 **'정태산'**이 2대 총통 자리를 물려받았습니다.\n이 시기부터 동경 지하의 기술과 활성 미스트를 접목한 대한제국만의 위험한 기술 개발이 가속화되었습니다.\n\n3. 제2차 세계대전의 종식과 독일의 몰락 (1970)\n지루하게 이어지던 전쟁은 미-소 연합의 총공세와 히틀러의 사망, 그리고 나치 수뇌부의 암살로 인해 마침내 종지부를 찍었습니다.\n나치의 뒤를 이은 **프리드리히 클라인** 총통은 유럽과 소련 영토에서의 전면 철수, 몽골 땅의 반환을 조건으로 국가 존속을 약속받았습니다.\n이로써 광기 어린 제국 나치는 몰락하고, 현재의 '독일'로서 전후 복구 체제에 들어서게 됩니다.\n\n4. 대륙 침공과 '자폭병'의 공포 (1971~1980)\n독일의 몰락 직후, 대한제국은 중화인민공화국에 전격적으로 선전포고를 감행했습니다.\n명분은 내정 간섭이었으나 실상은 대륙으로의 세력 확장이었습니다.\n전쟁 중 중국 본토의 주요 시설들을 초토화한 것은 대한제국이 양산한 **'자폭병'**들이었습니다.\n이는 과거 일제강점기 시절의 인력들을 미스트 기술로 세뇌하여 만든 반인륜적 병기였음이 훗날 밝혀졌습니다.\n결국 1980년, 충칭과 광저우에 대한제국의 신형 미스트 폭탄 **'화랑'**과 **'천뢰'**가 투하되었습니다.\n미국의 기술을 개량한 이 가공할 무력 앞에 중국은 베이징에서 하얼빈에 이르는 영토를 양도하며 항복을 선언했습니다.\n이로써 대한제국은 동아시아의 압도적인 패권국으로 우뚝 서게 됩니다.` },
            { img: 'Prologue/prologue_3', text: `1. 냉전의 균열과 대한제국의 독자 행보 (1988~1989)\n1980년대 후반, 영원할 것 같던 소비에트 연방에 붕괴의 조짐이 나타나기 시작했습니다.\n이 혼란을 틈타 소련과 대한제국 사이의 비밀스러운 접촉이 포착되었고, 이에 분노한 미국은 해명을 요구하며 강력히 압박했습니다.\n그러나 대한제국 측은 **"우리가 누굴 만나든 당신들이 상관할 바 아니다"**라는 태도로 일축하며 미국의 보복성 경제 제재마저 무력화시켰습니다.\n이는 미국 주도의 세계 질서가 더 이상 유효하지 않음을 보여주는 상징적인 사건이었습니다.\n\n2. 기적의 연구 도시, '투마놉스크' 건설 (1992)\n1992년, 대한제국과 소련, 그리고 독일연방공화국은 세상을 놀라게 한 **'3국 공동연구조약'**을 체결합니다.\n미스트 기술의 정점을 찍기 위해 선택된 장소는 몽골의 울란바토르였습니다.\n이곳에 단 1년 만에 건설된 거대 연구 도시 **'투마놉스크(Tumanovsk)'**는 3국의 자본과 기술, 인력이 집약된 결정체였습니다.\n수많은 연구자와 거주민이 이주하며 도시는 곧 세계 최대 규모의 연구 산업 도시로 급성장했습니다.\n\n3. 국제기구 TTA의 실패와 TWSC의 등장 (2005~2008)\n21세기에 들어서며 인류는 평화 유지를 위한 새로운 국제기구 설립을 추진했습니다.\n2005년 미국과 서유럽 국가들이 중심이 되어 TTA(The Terran Assembly) 설립을 제안했으나, 각국의 복잡한 이해관계 충돌로 인해 기각되고 맙니다.\n하지만 2008년, 소련·독일·대한제국·프랑스·캐나다 5개국이 주축이 되어 제안한 **TWSC(The World Stability Council, 세계 안정 이사회)**는 달랐습니다.\n이들은 단순한 정치적 결탁이 아닌, '각국의 회의를 보증하고 평화를 토의하는 순수한 보증 기관'임을 내세워 국제 사회의 공감대를 얻는 데 성공했습니다.\n\n4. 새로운 세계 질서의 확립 (2010)\nTWSC의 영향력은 빠르게 확대되었습니다.\n설립 주도국인 5개국을 제외한 지구상의 거의 모든 국가가 2010년까지 TWSC에 가입을 완료했습니다.\n이로써 TWSC는 명실상부한 지구 최대의 의사결정 기구로 자리 잡았으며, 투마놉스크에서 뿜어져 나오는 미스트 기술의 혜택과 함께 인류는 잠시나마 위태로운 평화의 시대를 누리게 되었습니다.` },
            { img: 'Prologue/prologue_4', text: `1. 묻혀버린 진실: '한성일보'의 몰락과 합병 (2015년 5월)\n세계를 뒤흔든 대재앙의 전조는 작은 뉴스 기사 하나에서 시작되었습니다.\n대한제국의 대형 언론사 **'한성일보'**가 **'투마놉스크 실종사건'**을 화두로 올린 것입니다.\n그러나 기묘하게도 보도 직후, 한성일보는 경영진의 갑작스러운 논란과 경영 악화라는 파도에 휩쓸려 순식간에 몰락했습니다.\n결국 한성일보는 라이벌사인 **'광천일보'**에 합병되었고, 투마놉스크에 대한 의혹은 대중의 기억 속에서 잠시 묻히는 듯했습니다.\n\n2. 세 과학자의 실종과 TWSC 회의장의 파행 (2015년 7월)\n침묵을 깨고 진실을 다시 수면 위로 끌어올린 것은 합병된 광천일보였습니다.\n광천일보의 집요한 추적 결과, 투마놉스크 미스트 연구의 최고 권위자였던 3국 과학자들의 동시 실종이 확인되었습니다.\n\n대한제국의 **공민석(Gong Min-seok)**\n독일의 **에밀 슈나이더(Emil Schneider)**\n소련의 **게오르기 니콜라예비치 라흐마닌(Rahmanin)**\n\n이 사실이 밝혀지자 독일과 소련은 즉각 반발했습니다.\nTWSC 회의에서 두 국가는 대한제국을 강하게 압박했으나, 대한제국 대표는 **"해당 사건에 대해선 함구하겠다. 우리를 망신 준 대가를 치르게 될 것"**이라는 위협적인 발언만 남긴 채 회의장을 박차고 나갔습니다.\n\n3. **'띠용찬'**의 폭로와 그림자 통제의 시작 (2015년 8월~9월)\n국제적인 갈등이 격화되던 중, 동영상 공유 사이트 '와치뷰'에 기괴한 영상 하나가 업로드되었습니다.\n투마놉스크 거주 인플루언서 **'띠용찬'**이 올린 **'투마놉스크에서 괴물 봤음 ㅋㅋㅋㅋ'**이라는 영상이었습니다.\n당시 사람들은 이를 단순한 조작이나 노이즈 마케팅으로 치부했으나, 한 달 뒤 영상은 강제 삭제되었고 띠용찬 채널에 대한 대한제국 정부의 보이지 않는 압력이 감지되기 시작했습니다.\n\n4. 침묵하는 도시: 투마놉스크의 암흑기 (2015년 12월)\n매주 영상을 올리던 띠용찬은 12월을 기점으로 완전히 자취를 감췄습니다.\n구독자들 사이에서는 "정부에 잡혀간 것 아니냐"는 농담 섞인 우려가 나왔지만, 상황은 농담으로 끝날 수준이 아니었습니다.\n이후 투마놉스크 내부에서 촬영된 모든 영상과 기록은 업로드되는 즉시 삭제되었으며, 거대 연구 산업 도시는 외부와 철저히 차단된 채 **'안개 속의 블랙박스'**가 되어버렸습니다.` },
            { img: 'Prologue/prologue_5', text: `1. 피의 증언: **공민석** 박사의 고발과 암살 (2021년 1월)\n실종되었던 미스트 연구의 최고 권위자 **공민석** 박사가 미국의 지원 하에 투마놉스크를 탈출, 국제 사회 앞에 섰습니다.\n그는 대한제국이 '우주 개척'이라는 위대한 명분을 내세워 전 세계의 인재를 모았으나, 실제로는 미스트 기술을 집약한 **'궤도대량살상무기'**를 개발하고 있었다는 충격적인 진실을 폭로했습니다.\n하지만 고발이 시작된 직후, **공민석** 박사는 괴한에게 암살당했으며 회장 내부에는 정체불명의 폭발이 발생했습니다.\n이 사건으로 미국의 국방장관을 포함한 주요 인사들이 현장에서 사망했습니다.\n특히 폭발 직후 고밀도의 미스트 에너지와 함께 나타난 **'뒤틀린 생명체'**는 현장을 아비규환으로 만들었고, 이는 과거 인플루언서 **띠용찬**이 목격했던 '괴물'의 존재가 실재함을 전 세계에 증명했습니다.\n\n2. 제국의 고립과 광기 어린 연구 (2021년 4월)\n폭로장 학살 사건 이후, 국제 사회는 대한제국을 TWSC를 비롯한 모든 국제기구와 조약에서 영구 제명했습니다.\n전 세계적인 고립 무원이 된 대한제국은 반성 대신 극도의 위기감을 느꼈고, 생존을 명분으로 미스트 기술에 대한 광적인 연구에 더욱 박차를 가했습니다.\n이때부터 미스트 기술은 통제를 벗어나 위험한 수준으로 치닫기 시작했습니다.\n\n3. **정태산**의 죽음과 멈출 수 없는 파멸 (2022년 12월)\n국가적 위기 속에서 2대 총통 **정태산**은 국제적인 사과와 사태 수습을 준비하려 했으나, 돌연 암살당하며 대한제국은 통제 불능의 혼란에 빠졌습니다.\n그 직후, 투마놉스크에서는 인류 역사상 유례없는 광대한 미스트 반응이 감지되었습니다.\n미국과 각국 정부는 대한제국에 사태 해결을 강력히 촉구하려 했으나, 그것은 이미 돌이킬 수 없는 재앙의 문턱이었습니다.\n인류가 쌓아 올린 찬란한 미스트 문명이 스스로의 무게를 견디지 못하고 붕괴하기 직전의 마지막 순간이었습니다.` },
            { img: 'Prologue/prologue_6', text: `1. 안개사태(Fogfall Event)와 차원의 붕괴 (2023년 1월)\n마침내 인류가 두려워하던 최악의 시나리오, **'안개사태'**가 발발했습니다.\n남극을 제외한 지구 전역이 고밀도의 미스트에 잠식되었으며, 제2차 세계대전 이후 잠잠했던 **'차원 균열'**이 전 세계 곳곳에서 동시다발적으로 열렸습니다.\n이 균열은 단순한 에너지의 통로가 아니었습니다.\n그 안에서는 미스트와 함께 인류를 사냥하는 기괴한 괴생명체들이 쏟아져 나오기 시작했습니다.\n\n2. 필사의 탈출과 무너진 성역 (2023년 상반기)\n인류는 미스트가 유일하게 닿지 않은 남극으로 대피하기 위해 필사의 사투를 벌였습니다.\n일부는 고산지대로, 일부는 깊은 지하 요새로 숨어들었습니다.\n그러나 대한제국을 포함한 대부분의 강대국은 미스트가 유발하는 이상현상, 신체적 변이, 정신적 타락에 휘말려 대응력을 상실했습니다.\n대피 시기를 놓친 국가들은 괴생명체의 습격 속에 하나둘 지도에서 사라졌습니다.\n\n3. 인류의 89% 절멸과 기술의 소실 (2024년 5월)\n재앙이 시작된 지 불과 1년여 만에 지구 인구의 89%가 절멸했습니다.\n생존을 위해 개발된 안티 미스트 장비들이 뒤늦게 보급되었으나, 이미 인류 문명을 지탱하던 지식과 인프라는 붕괴된 상태였습니다.\n고산지나 지하 대피소로 피신한 소수의 생존자들조차 기술과 자원의 부족으로 인해 과거의 찬란했던 미스트 기술을 재현하지 못한 채, 원시적이고 처절한 생존 투쟁을 이어가게 되었습니다.\n\n4. 잃어버린 시대의 시작 (2025년 현재)\n한때 세상을 지배했던 거대 기업과 국가들은 이제 전설 속의 이야기가 되었습니다.\n인류는 안개에 가려진 태양 아래에서 과거의 잔해를 뒤지며 오늘 하루를 버텨내고 있습니다.\n과거의 영광은 사라지고, 오로지 안개와 괴물, 그리고 변이된 대지만이 남은 **'미스트 어스(Mist Earth)'**의 시대가 도래한 것입니다.` },
            { img: 'Prologue/prologue_7', text: `당신.\n당신은 인류의 89%가 증발해버린 이 모든 지옥 속에서 살아남아, 한때 당신을 보호했던 세력의 울타리를 넘어 탈출한 생존자입니다.\n그 선택의 이유가 무엇인지는 중요하지 않습니다.\n그것이 숭고한 신념이었는지, 비열한 이득을 위함이었는지, 아니면 안개 너머에서 속삭이는 정체 모를 무언가에 의한 유혹이었는지조차 말입니다.\n지금 이 기록을 읽고 있다는 사실만이 단 하나의 진실을 증명합니다.\n당신은 살아남았고, 이제부터 고독한 **'미스트 워커(Mist Walker)'**로서의 삶을 받아들이기로 했다는 것.\n\n**'미스트 워커'**라는 이름이 아직은 낯설게 느껴질지도 모르겠습니다.\n그것은 특정 국가나 세력의 깃발 아래 서기를 거부하고, 오로지 자신만의 목적지를 향해 안개 속을 걷는 자들을 일컫는 말입니다.\n물론 어느 세력에 잠시 몸을 의탁하거나 소속되어 활동하는 것 또한 당신의 자유입니다.\n하지만 우리는 알고 있습니다.\n당신은 고작 누군가의 부품이 되는 것으로 만족할 존재가 아니라는 것을요.\n\n단 하나만 명심하십시오.\n이 땅 위에서 당신은 무엇으로부터든 자유로울 수 있으나, 결코 '미스트' 그 자체로부터는 자유로울 수 없다는 사실을.\n\n행운을 빕니다.\n안개가 당신의 발자취를 집어삼키기 전에.\n\n— Crome_0114` },
        ];
        const IMG_EXTS = ['jpg', 'jpeg', 'png', 'webp', 'gif'];
        let prologuePage = 0;
        let prologueTyping = false;
        let prologueSkip = false;

        // 확장자 자동 탐색 (타임아웃 500ms)
        async function findImage(baseName) {
            for (const ext of IMG_EXTS) {
                const src = `${baseName}.${ext}`;
                const ok = await new Promise(res => {
                    const img = new Image();
                    const timer = setTimeout(() => res(false), 500);
                    img.onload = () => { clearTimeout(timer); res(true); };
                    img.onerror = () => { clearTimeout(timer); res(false); };
                    img.src = src;
                });
                if (ok) return src;
            }
            return null;
        }

        async function runPrologueScenario() {
            prologuePage = 0;
            await showProloguePage(0);
        }

        async function showProloguePage(idx) {
            const data = prologueData[idx];
            const slide = document.getElementById('prologue-slide');
            const imgWrap = document.getElementById('prologue-img-wrap');
            const fallback = document.getElementById('prologue-img-fallback');
            const body = document.getElementById('prologue-body');
            const nextBtn = document.getElementById('prologue-next-btn');
            const pageNum = document.getElementById('prologue-page-num');

            // 페이드 아웃 (첫 페이지는 이미 숨겨져 있으므로 스킵)
            if (slide.classList.contains('visible')) {
                slide.classList.remove('visible');
                await wait(800); // transition 완료 대기
            }

            // 콘텐츠 교체
            body.textContent = '';
            nextBtn.classList.remove('show');
            pageNum.textContent = `— 0${idx + 1} / 0${prologueData.length} —`;

            const oldImg = imgWrap.querySelector('img');
            if (oldImg) oldImg.remove();
            fallback.style.display = 'flex';
            fallback.textContent = `[ ${data.img} ]`;

            const imgSrc = await findImage(data.img);
            if (imgSrc) {
                fallback.style.display = 'none';
                const imgEl = document.createElement('img');
                imgEl.src = imgSrc;
                imgWrap.appendChild(imgEl);
            }

            // 페이드 인
            await wait(100);
            slide.classList.add('visible');
            await wait(800);

            // 텍스트를 소제목/문단 블록으로 파싱
            function parseBlocks(text) {
                return text.split('\n')
                    .map(l => l.trim()).filter(l => l !== '')
                    .map(l => /^\d+\.\s/.test(l)
                        ? { type: 'title', text: l }
                        : { type: 'para',  text: l });
            }

            function parseBoldHTML(text) {
                return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            }

            prologueTyping = true;
            prologueSkip = false;
            body.innerHTML = '';
            const blocks = parseBlocks(data.text);

            for (let bi = 0; bi < blocks.length; bi++) {
                const block = blocks[bi];

                if (prologueSkip) {
                    for (let ri = bi; ri < blocks.length; ri++) {
                        const el = document.createElement('span');
                        el.className = blocks[ri].type === 'title' ? 'section-title' : 'para';
                        el.innerHTML = parseBoldHTML(blocks[ri].text);
                        body.appendChild(el);
                    }
                    break;
                }

                const el = document.createElement('span');
                el.className = block.type === 'title' ? 'section-title' : 'para';
                body.appendChild(el);

                const raw = block.text;
                let i = 0;
                while (i < raw.length) {
                    if (prologueSkip) { el.innerHTML = parseBoldHTML(raw); break; }
                    if (raw[i] === '*' && raw[i+1] === '*') {
                        const end = raw.indexOf('**', i + 2);
                        if (end !== -1) {
                            const boldText = raw.slice(i + 2, end);
                            for (let j = 0; j <= boldText.length; j++) {
                                if (prologueSkip) { el.innerHTML = parseBoldHTML(raw); break; }
                                el.innerHTML = parseBoldHTML(raw.slice(0, i)) + '<strong>' + boldText.slice(0, j) + '</strong>';
                                body.scrollTop = body.scrollHeight;
                                if (j < boldText.length) await wait(30);
                            }
                            i = end + 2;
                            continue;
                        }
                    }
                    el.innerHTML = parseBoldHTML(raw.slice(0, i + 1));
                    body.scrollTop = body.scrollHeight;
                    await wait(30);
                    i++;
                }
                el.innerHTML = parseBoldHTML(raw);
                if (block.type === 'title') await wait(150);
            }
            prologueTyping = false;

            // NEXT 버튼 표시
            nextBtn.textContent = idx < prologueData.length - 1 ? 'NEXT ▶' : '시작하기 ▶';
            nextBtn.classList.add('show');
        }

        function prologueNext(e) {
            e.stopPropagation();
            // 타이핑 중이면 스킵
            if (prologueTyping) { prologueSkip = true; return; }
            prologuePage++;
            if (prologuePage < prologueData.length) {
                showProloguePage(prologuePage);
            } else {
                // 프롤로그 끝 → 본편으로 (추후 연결)
                changeScene('MAIN');
            }
        }

        // 프롤로그 씬에서 클릭 시 타이핑 스킵
        document.addEventListener('click', () => {
            if (prologueTyping) prologueSkip = true;
        });

        // ✅ 추가: 팝업에서 [아니오] 누르면 팝업 닫고 선택지 복원
        function closePrologueConfirm(e) {
            e.stopPropagation();
            document.getElementById('prologue-confirm-ui').style.display = 'none';
            document.getElementById('protocol-choices-ui').style.display = 'flex';
        }

        // --- [4] 뮤직 플레이어 ---

        // ✅ 추가: 재생 모드 (0=한곡반복, 1=전체반복, 2=랜덤, 3=순서대로 한번)
        // 디폴트는 0 (한곡반복)
        let playMode = 0;
        const playModeConfig = [
            { label: '↩1',  title: '한 곡 반복'      },
            { label: '↩∞',  title: '전체 반복'        },
            { label: 'RND', title: '랜덤 재생'        },
            { label: '→',   title: '순서대로 (반복없음)' },
        ];

        function updateRepeatBtn() {
            const btn = document.getElementById('repeat-btn');
            const cfg = playModeConfig[playMode];
            btn.textContent = cfg.label;
            btn.title = cfg.title;
            btn.style.borderColor = playMode === 3 ? '#444' : '#33ff33';
            btn.style.color       = playMode === 3 ? '#444' : '#33ff33';
            // ✅ 수정: 모드 변경 시 현재 재생 중인 곡의 loop도 즉시 반영
            mainBgm.loop = (playMode === 0);
        }

        document.getElementById('repeat-btn').onclick = (e) => {
            e.stopPropagation();
            playMode = (playMode + 1) % 4;
            updateRepeatBtn();
        };

        async function initMusicPlayer() {
            try {
                const res = await fetch('Music/list.json');
                const files = await res.json();
                playlist = files.map(f => ({ src: `Music/${f}`, title: f.split('.')[0].toUpperCase() }));
                const listHtml = document.getElementById('track-list');
                listHtml.innerHTML = '';
                playlist.forEach((t, i) => {
                    const li = document.createElement('li');
                    li.className = 'track-item' + (i === currentTrackIndex ? ' active' : '');
                    li.textContent = t.title;
                    li.onclick = (e) => { e.stopPropagation(); playTrack(i); };
                    listHtml.appendChild(li);
                });

                updateRepeatBtn();

                // ✅ 수정: 자동재생 전에 먼저 이벤트 등록
                mainBgm.addEventListener('ended', () => {
                    if (playMode === 0) return;
                    if (playMode === 1) {
                        playTrack((currentTrackIndex + 1) % playlist.length);
                    } else if (playMode === 2) {
                        let next;
                        do { next = Math.floor(Math.random() * playlist.length); }
                        while (playlist.length > 1 && next === currentTrackIndex);
                        playTrack(next);
                    } else if (playMode === 3) {
                        if (currentTrackIndex < playlist.length - 1) playTrack(currentTrackIndex + 1);
                        else document.getElementById('play-pause-btn').textContent = '▶';
                    }
                });

                // 리스트 로드 후 첫 번째 트랙 자동 재생
                if (playlist.length > 0) playTrack(0);

            } catch (e) { console.log("Music Error"); }
        }

        function playTrack(i) {
            currentTrackIndex = i;
            mainBgm.src = playlist[i].src;
            mainBgm.loop = (playMode === 0); // 한곡반복만 loop
            mainBgm.play();
            document.querySelectorAll('.track-item').forEach((el, idx) => el.className = 'track-item' + (idx === i ? ' active' : ''));
            document.getElementById('play-pause-btn').textContent = '||';
        }

        document.getElementById('music-toggle-btn').onclick = (e) => {
            e.stopPropagation();
            const pop = document.getElementById('music-player-popup');
            pop.style.display = pop.style.display === 'block' ? 'none' : 'block';
        };

        document.getElementById('play-pause-btn').onclick = (e) => {
            e.stopPropagation();
            if (mainBgm.paused) { mainBgm.play(); e.target.textContent = '||'; }
            else { mainBgm.pause(); e.target.textContent = '▶'; }
        };

        mainBgm.ontimeupdate = () => { document.getElementById('progress-bar-fill').style.width = (mainBgm.currentTime / mainBgm.duration * 100) + '%'; };

        document.getElementById('progress-bar-bg').onclick = (e) => {
            e.stopPropagation();
            const rect = e.target.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            mainBgm.currentTime = pos * mainBgm.duration;
        };

        document.getElementById('volume-slider').oninput = (e) => { mainBgm.volume = e.target.value; };

        function saveGame(e) {
            e.stopPropagation();
            const blob = new Blob([JSON.stringify(GameState, null, 2)], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `MistEarth_Save_${GameState.name || 'Unknown'}.json`;
            a.click();
        }
    </script>
</body>
</html>
